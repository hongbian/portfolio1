<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>· · ·</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=DM+Mono:wght@300..500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="world">

  <!-- the void — deep space backdrop -->
  <div id="void">
    <div class="void-glow"></div>
    <!-- stars generated by JS for variety -->
    <div id="stars"></div>
    <!-- distant other planets visible from her planet -->
    <div class="far-planet fp1"></div>
    <div class="far-planet fp2"></div>
    <div class="far-planet fp3"></div>

    <!-- the moon that orbits this planet, visible above the horizon -->
    <div class="moon-orbit">
      <div class="moon"></div>
    </div>

    <!-- a passing comet, occasional -->
    <div class="comet"></div>
    <!-- a faint nebula -->
    <svg class="nebula" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <defs>
        <radialGradient id="neb1" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#e87aa2" stop-opacity="0.35"/>
          <stop offset="60%" stop-color="#b89ac8" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
        <radialGradient id="neb2" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#8da8c8" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
      </defs>
      <ellipse cx="600" cy="200" rx="300" ry="180" fill="url(#neb1)"/>
      <ellipse cx="150" cy="600" rx="240" ry="160" fill="url(#neb2)"/>
    </svg>
  </div>

  <!-- the planet stage — rotates as player walks -->
  <div id="planet-stage">
    <!-- the planet itself, SVG so we can rotate things on it -->
    <svg id="planet" viewBox="-500 -500 1000 1000" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
      <defs>
        <!-- planet body gradient -->
        <radialGradient id="planetBody" cx="35%" cy="35%" r="75%">
          <stop offset="0%"  stop-color="#fbeadd"/>
          <stop offset="50%" stop-color="#f0c8a8"/>
          <stop offset="100%" stop-color="#a87858"/>
        </radialGradient>
        <radialGradient id="planetGrass" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#a8c8a8" stop-opacity="0"/>
          <stop offset="80%" stop-color="#9bb89a" stop-opacity="0"/>
          <stop offset="100%" stop-color="#7ea87e" stop-opacity="1"/>
        </radialGradient>
        <pattern id="planetDots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="2" cy="2" r="0.9" fill="#6a4838" opacity="0.18"/>
        </pattern>
        <!-- a soft inner shadow ring -->
        <radialGradient id="atmoGlow" cx="50%" cy="50%" r="50%">
          <stop offset="92%" stop-color="transparent"/>
          <stop offset="100%" stop-color="#fce4cf" stop-opacity="0.8"/>
        </radialGradient>
        <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3"/>
        </filter>
      </defs>

      <!-- atmosphere glow ring (outside the planet) — softer -->
      <circle cx="0" cy="0" r="418" fill="none" stroke="#fce4cf" stroke-width="14" opacity="0.35" filter="url(#softShadow)"/>
      <circle cx="0" cy="0" r="408" fill="none" stroke="#fde2ec" stroke-width="6" opacity="0.5" filter="url(#softShadow)"/>

      <!-- planet body — the radius the character walks on is 400 -->
      <circle cx="0" cy="0" r="400" fill="url(#planetBody)"/>
      <circle cx="0" cy="0" r="400" fill="url(#planetDots)"/>
      <!-- grass ring at the surface -->
      <circle cx="0" cy="0" r="400" fill="url(#planetGrass)" opacity="0.9"/>

      <!-- inner core variation - continents/marks -->
      <path d="M -180 -120 Q -120 -180 -40 -160 Q 20 -140 40 -100 Q 30 -50 -40 -40 Q -140 -40 -180 -120 Z" fill="#a87858" opacity="0.35"/>
      <path d="M 100 80 Q 160 60 200 100 Q 220 160 180 180 Q 120 200 100 160 Q 80 110 100 80 Z" fill="#a87858" opacity="0.35"/>
      <path d="M -60 180 Q -20 160 20 200 Q 0 240 -40 230 Q -80 220 -60 180 Z" fill="#a87858" opacity="0.3"/>

      <!-- the "ocean" — a small reflective pond on the planet, embedded -->
      <g transform="rotate(0)">
        <ellipse cx="0" cy="-380" rx="60" ry="14" fill="#a8c8d8" opacity="0.6"/>
      </g>

      <!-- ============================================================
           OBJECTS ON THE PLANET
           Each object is rooted at the surface and extends radially OUT.
           Surface radius = 400. Each object's group is rotated by its
           "angle" on the planet, then translated to (0, -400) so it
           sits on the top of the planet at that rotation.
           ============================================================ -->

      <!-- ANGLE 0: A door standing alone -->
      <g class="planet-obj" data-id="door" transform="rotate(0)">
        <g transform="translate(0 -400)">
          <!-- shadow on ground -->
          <ellipse cx="0" cy="0" rx="30" ry="4" fill="#000" opacity="0.15"/>
          <!-- door frame -->
          <g transform="translate(0 -85)">
            <rect x="-25" y="-85" width="50" height="170" fill="#8a5e44" stroke="#2b2536" stroke-width="1.5" rx="2"/>
            <rect x="-20" y="-80" width="40" height="160" fill="#a87858"/>
            <!-- panel -->
            <rect x="-15" y="-70" width="30" height="50" fill="none" stroke="#6a4838" stroke-width="1"/>
            <rect x="-15" y="-12" width="30" height="80" fill="none" stroke="#6a4838" stroke-width="1"/>
            <circle cx="12" cy="20" r="2" fill="#d4a849"/>
            <!-- glow when near -->
            <ellipse cx="0" cy="-30" rx="50" ry="60" fill="#fff5e0" opacity="0" class="obj-glow"/>
          </g>
        </g>
      </g>

      <!-- ANGLE 45: A telephone (no wires, just standing) - RINGS -->
      <g class="planet-obj" data-id="phone" transform="rotate(45)">
        <g transform="translate(0 -400)">
          <ellipse cx="0" cy="0" rx="22" ry="3" fill="#000" opacity="0.15"/>
          <g transform="translate(0 -28)" class="phone-shake">
            <!-- pedestal -->
            <rect x="-12" y="-4" width="24" height="32" fill="#2b2536" rx="2"/>
            <rect x="-10" y="-2" width="20" height="6" fill="#e87aa2"/>
            <!-- receiver -->
            <path d="M -16 -20 Q -18 -14 -12 -10 L -4 -8 Q 0 -10 4 -8 L 12 -10 Q 18 -14 16 -20 Q 12 -24 4 -22 L -4 -22 Q -12 -24 -16 -20 Z"
                  fill="#fbeadd" stroke="#2b2536" stroke-width="1"/>
            <!-- dialer dots -->
            <circle cx="-4" cy="6" r="1" fill="#fbeadd"/>
            <circle cx="0" cy="6" r="1" fill="#fbeadd"/>
            <circle cx="4" cy="6" r="1" fill="#fbeadd"/>
          </g>
          <!-- ring lines bursting out -->
          <g class="ring-lines">
            <line x1="-26" y1="-44" x2="-32" y2="-50" stroke="#e87aa2" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="0" y1="-50" x2="0" y2="-58" stroke="#e87aa2" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="26" y1="-44" x2="32" y2="-50" stroke="#e87aa2" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="-30" y1="-32" x2="-38" y2="-32" stroke="#e87aa2" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="30" y1="-32" x2="38" y2="-32" stroke="#e87aa2" stroke-width="1.5" stroke-linecap="round"/>
          </g>
          <ellipse cx="0" cy="-40" rx="30" ry="20" fill="#fff5e0" opacity="0" class="obj-glow"/>
        </g>
      </g>

      <!-- ANGLE 90: A chair facing outward (toward the void) -->
      <g class="planet-obj" data-id="chair" transform="rotate(90)">
        <g transform="translate(0 -400)">
          <ellipse cx="0" cy="0" rx="20" ry="3" fill="#000" opacity="0.15"/>
          <g transform="translate(0 -10)">
            <!-- legs -->
            <rect x="-14" y="-10" width="2" height="12" fill="#2b2536"/>
            <rect x="12" y="-10" width="2" height="12" fill="#2b2536"/>
            <!-- seat -->
            <rect x="-16" y="-14" width="32" height="6" fill="#e87aa2" stroke="#2b2536" stroke-width="1"/>
            <!-- back -->
            <rect x="-12" y="-40" width="24" height="28" fill="#e87aa2" stroke="#2b2536" stroke-width="1" rx="2"/>
            <line x1="-12" y1="-28" x2="12" y2="-28" stroke="#2b2536" stroke-width="0.8"/>
            <ellipse cx="0" cy="-30" rx="30" ry="25" fill="#fff5e0" opacity="0" class="obj-glow"/>
          </g>
        </g>
      </g>

      <!-- ANGLE 135: A staircase going up to nothing -->
      <g class="planet-obj" data-id="stairs" transform="rotate(135)">
        <g transform="translate(0 -400)">
          <ellipse cx="0" cy="0" rx="30" ry="3" fill="#000" opacity="0.15"/>
          <g transform="translate(0 0)">
            <!-- 5 steps, each smaller and higher -->
            <rect x="-22" y="-8" width="44" height="8" fill="#c89a78" stroke="#2b2536" stroke-width="0.8"/>
            <rect x="-18" y="-16" width="36" height="8" fill="#c89a78" stroke="#2b2536" stroke-width="0.8"/>
            <rect x="-14" y="-24" width="28" height="8" fill="#c89a78" stroke="#2b2536" stroke-width="0.8"/>
            <rect x="-10" y="-32" width="20" height="8" fill="#c89a78" stroke="#2b2536" stroke-width="0.8"/>
            <rect x="-6"  y="-40" width="12" height="8" fill="#c89a78" stroke="#2b2536" stroke-width="0.8"/>
            <rect x="-3"  y="-48" width="6" height="8" fill="#c89a78" stroke="#2b2536" stroke-width="0.8"/>
            <!-- a tiny dot at the top, going to nothing -->
            <circle cx="0" cy="-52" r="1.5" fill="#2b2536"/>
            <ellipse cx="0" cy="-40" rx="40" ry="25" fill="#fff5e0" opacity="0" class="obj-glow"/>
          </g>
        </g>
      </g>

      <!-- ANGLE 180: A single tree with eyes -->
      <g class="planet-obj" data-id="tree" transform="rotate(180)">
        <g transform="translate(0 -400)">
          <ellipse cx="0" cy="0" rx="34" ry="4" fill="#000" opacity="0.15"/>
          <g transform="translate(0 -30)">
            <!-- trunk -->
            <path d="M -4 30 Q -5 0 -3 -10 L 3 -10 Q 5 0 4 30 Z" fill="#8a5e44" stroke="#2b2536" stroke-width="1"/>
            <!-- canopy -->
            <ellipse cx="0" cy="-20" rx="28" ry="22" fill="#7ea87e" stroke="#2b2536" stroke-width="1"/>
            <ellipse cx="-12" cy="-26" rx="14" ry="10" fill="#9bc89b"/>
            <ellipse cx="10" cy="-18" rx="10" ry="8" fill="#9bc89b"/>
            <!-- the EYES — what makes it strange -->
            <ellipse cx="-7" cy="-20" rx="3" ry="4" fill="#fffaf2"/>
            <ellipse cx="7" cy="-20" rx="3" ry="4" fill="#fffaf2"/>
            <circle cx="-7" cy="-20" r="1.5" fill="#2b2536" class="eye-pupil"/>
            <circle cx="7" cy="-20" r="1.5" fill="#2b2536" class="eye-pupil"/>
            <ellipse cx="0" cy="-20" rx="36" ry="30" fill="#fff5e0" opacity="0" class="obj-glow"/>
          </g>
        </g>
      </g>

      <!-- ANGLE 225: A small mailbox -->
      <g class="planet-obj" data-id="mailbox" transform="rotate(225)">
        <g transform="translate(0 -400)">
          <ellipse cx="0" cy="0" rx="14" ry="3" fill="#000" opacity="0.15"/>
          <g transform="translate(0 -20)">
            <rect x="-1" y="0" width="2" height="22" fill="#8a5e44"/>
            <!-- box -->
            <path d="M -14 -16 Q -14 -22 -8 -22 L 8 -22 Q 14 -22 14 -16 L 14 0 L -14 0 Z"
                  fill="#e87aa2" stroke="#2b2536" stroke-width="1"/>
            <rect x="-2" y="-12" width="14" height="2" fill="#2b2536"/>
            <!-- flag -->
            <rect x="14" y="-18" width="6" height="6" fill="#d4a849" stroke="#2b2536" stroke-width="0.8"/>
            <ellipse cx="0" cy="-12" rx="22" ry="18" fill="#fff5e0" opacity="0" class="obj-glow"/>
          </g>
        </g>
      </g>

      <!-- ANGLE 270: A bed (sleeping) -->
      <g class="planet-obj" data-id="bed" transform="rotate(270)">
        <g transform="translate(0 -400)">
          <ellipse cx="0" cy="0" rx="34" ry="3" fill="#000" opacity="0.15"/>
          <g transform="translate(0 -8)">
            <!-- bed frame -->
            <rect x="-30" y="-4" width="60" height="10" fill="#8a5e44" stroke="#2b2536" stroke-width="1"/>
            <!-- mattress -->
            <rect x="-28" y="-12" width="56" height="10" fill="#fde2ec" stroke="#2b2536" stroke-width="1" rx="2"/>
            <!-- pillow -->
            <rect x="-24" y="-16" width="14" height="6" fill="#fffaf2" stroke="#2b2536" stroke-width="0.8" rx="2"/>
            <!-- blanket -->
            <path d="M -10 -10 L 28 -10 L 28 -2 L -10 -2 Z" fill="#b89ac8" stroke="#2b2536" stroke-width="0.8"/>
            <!-- Z's floating up -->
            <text x="6" y="-26" font-family="Caveat, cursive" font-size="14" fill="#b89ac8" class="zzz">z</text>
            <text x="14" y="-32" font-family="Caveat, cursive" font-size="12" fill="#b89ac8" class="zzz zzz2">z</text>
            <text x="22" y="-40" font-family="Caveat, cursive" font-size="10" fill="#b89ac8" class="zzz zzz3">z</text>
            <ellipse cx="0" cy="-14" rx="40" ry="20" fill="#fff5e0" opacity="0" class="obj-glow"/>
          </g>
        </g>
      </g>

      <!-- ANGLE 315: A floating umbrella — open, upside down catching air -->
      <g class="planet-obj" data-id="umbrella" transform="rotate(315)">
        <g transform="translate(0 -400)">
          <ellipse cx="0" cy="0" rx="10" ry="2" fill="#000" opacity="0.12"/>
          <g transform="translate(0 -36)" class="umbrella-float">
            <!-- canopy as dome -->
            <path d="M -22 0 Q -22 -28 0 -28 Q 22 -28 22 0 Z" fill="#e87aa2" stroke="#2b2536" stroke-width="1"/>
            <line x1="-15" y1="-3" x2="-7" y2="-25" stroke="#2b2536" stroke-width="0.8"/>
            <line x1="0" y1="0" x2="0" y2="-28" stroke="#2b2536" stroke-width="0.8"/>
            <line x1="15" y1="-3" x2="7" y2="-25" stroke="#2b2536" stroke-width="0.8"/>
            <!-- handle -->
            <path d="M 0 0 L 0 20 Q 0 26 6 26" fill="none" stroke="#8a5e44" stroke-width="2"/>
            <ellipse cx="0" cy="-12" rx="26" ry="22" fill="#fff5e0" opacity="0" class="obj-glow"/>
          </g>
        </g>
      </g>

    </svg>
  </div>

  <!-- the player character — fixed in the screen center, since the WORLD rotates -->
  <div id="player-sprite">
    <div class="sprite-shadow"></div>
    <div class="sprite-body">
      <div class="sprite-head">
        <img src="assets/sprite_head.png" alt="" draggable="false"/>
      </div>
      <div class="sprite-torso"></div>
      <div class="sprite-leg left"></div>
      <div class="sprite-leg right"></div>
    </div>
  </div>

  <!-- interaction prompt -->
  <div id="prompt" class="hidden">
    <span class="prompt-key">E</span>
    <span class="prompt-text">look</span>
  </div>

  <!-- intro hint -->
  <div id="intro-hint">
    <span class="hint-line hl1">walk with <kbd>←</kbd> <kbd>→</kbd></span>
    <span class="hint-line hl2">the world is small. you'll find the edge.</span>
  </div>

  <!-- dialogue -->
  <div id="dialogue" class="hidden">
    <div class="dlg-portrait"><img src="assets/sprite_head.png" alt=""/></div>
    <div class="dlg-content">
      <div class="dlg-name"></div>
      <div class="dlg-text"></div>
      <div class="dlg-continue">▾</div>
    </div>
  </div>

  <!-- compass / position indicator (faint, top corner) — shows how far around the planet she is -->
  <div id="compass">
    <svg viewBox="-22 -22 44 44" width="44" height="44">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#fbeadd" stroke-width="1" opacity="0.4"/>
      <circle id="compass-dot" cx="0" cy="-18" r="2" fill="#e87aa2"/>
    </svg>
  </div>

</div>

<script src="game.js"></script>
</body>
</html>
